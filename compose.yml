services:
  api:
    build:
      dockerfile: Docker/api.dockerfile
    command: python -m uvicorn api.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

  worker:
    build:
      dockerfile: Docker/api.dockerfile
    command: dramatiq src.detection_jobs
    depends_on:
      - redis
      - postgres
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

  redis:
    image: redis:8

  postgres:
    image: postgres:18
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./scripts/db/dump.sql:/docker-entrypoint-initdb.d/01_dump.sql